name: Submodule Bump Gate

# S77 P2 Pass A — Parent-repo CI gate.
# Validates every commit to main that touches the `Game/founding-realm`
# submodule pointer.
#
# AUTH CONTEXT:
#   - Parent repo `legacy-of-the-realm` is PUBLIC
#   - Submodule repo `founding-realm` is PRIVATE
#   - Cross-repo access from GH Actions default GITHUB_TOKEN does NOT work
#     for private submodule repos. Requires a PAT.
#
# RUN MODES:
#   1. WITHOUT `SUBMODULE_PAT` secret (current default):
#      Performs local parent-index integrity check only.
#      Validates submodule SHA is a well-formed 40-char hex and .gitmodules
#      declares the expected repo. Does NOT confirm the SHA is pushed or
#      that the submodule builds.
#
#   2. WITH `SUBMODULE_PAT` secret (requires one-time Daniel action):
#      Full gate — clones submodule at SHA, runs tsc + tests + bundle +
#      audit checks. Produces the strongest guarantee against broken bumps.
#
# To enable full mode:
#   1. Create a PAT with `repo` scope at github.com/settings/tokens
#   2. Add as repo secret `SUBMODULE_PAT` at
#      github.com/daneshto-dotcom/legacy-of-the-realm/settings/secrets
#
# Council (S77 P2) adopted R8 mitigation. Degraded mode accepted as
# pragmatic first step; full mode remains target state.

on:
  push:
    branches: [main]
    paths:
      - 'Game/founding-realm'
  pull_request:
    branches: [main]
    paths:
      - 'Game/founding-realm'
  workflow_dispatch:

concurrency:
  group: submodule-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integrity:
    name: Parent index integrity
    runs-on: ubuntu-latest
    timeout-minutes: 3

    outputs:
      submodule_sha: ${{ steps.get-sha.outputs.sha }}
      has_pat: ${{ steps.get-sha.outputs.has_pat }}

    steps:
      - name: Checkout parent (no submodules)
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Read + validate submodule SHA
        id: get-sha
        run: |
          SHA=$(git ls-tree HEAD Game/founding-realm | awk '{print $3}')
          if [ -z "$SHA" ]; then
            echo "::error::Could not read submodule SHA from parent index"
            exit 1
          fi
          # Validate 40-char hex
          if ! echo "$SHA" | grep -qE '^[0-9a-f]{40}$'; then
            echo "::error::Submodule SHA $SHA is not a valid 40-char hex"
            exit 1
          fi
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          echo "Submodule SHA in parent: $SHA"

          # Check .gitmodules declaration matches expected repo
          if [ ! -f .gitmodules ]; then
            echo "::error::.gitmodules missing"
            exit 1
          fi
          if ! grep -q 'url = .*founding-realm' .gitmodules; then
            echo "::error::.gitmodules does not declare founding-realm url"
            exit 1
          fi
          echo "✓ Parent index + .gitmodules integrity OK"

          # Report whether full-mode PAT is available
          if [ -n "${{ secrets.SUBMODULE_PAT }}" ]; then
            echo "has_pat=true" >> $GITHUB_OUTPUT
            echo "SUBMODULE_PAT is set — full gate will run"
          else
            echo "has_pat=false" >> $GITHUB_OUTPUT
            echo "::notice::SUBMODULE_PAT not set — running in degraded mode. See workflow header for enable instructions."
          fi

  full-gate:
    name: Full gate (requires SUBMODULE_PAT)
    needs: integrity
    if: needs.integrity.outputs.has_pat == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout submodule at pinned SHA (with LFS)
        uses: actions/checkout@v4
        with:
          repository: daneshto-dotcom/founding-realm
          ref: ${{ needs.integrity.outputs.submodule_sha }}
          path: founding-realm
          token: ${{ secrets.SUBMODULE_PAT }}
          lfs: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: founding-realm/package-lock.json

      - name: Install canvas native deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev

      - name: Install dependencies
        run: cd founding-realm && npm ci

      - name: Typecheck
        run: cd founding-realm && npx tsc --noEmit

      - name: Run simulation tests
        run: cd founding-realm && npm test

      - name: Bundle check
        run: cd founding-realm && node scripts/bundle-check.js

      - name: Audit check
        run: cd founding-realm && node scripts/audit-check.js
